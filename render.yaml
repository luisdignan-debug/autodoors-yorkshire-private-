services:
  - type: web
    name: autodoors-yorkshire
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24
      - key: APP_MODE
        value: app
      - key: APP_PORT
        value: 3000
      - key: DRY_RUN
        value: "false"
      - key: AUTO_SEND
        value: "false"
      - key: AUTO_SEND_EMAILS
        value: "false"
      - key: DATABASE_PROVIDER
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: autodoors-yorkshire-db
          property: connectionString
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BUSINESS_NAME
        value: Autodoors Yorkshire
      - key: BUSINESS_EMAIL
        value: info@autodoorsyorkshire.com
      - key: OWNER_EMAIL
        value: info@autodoorsyorkshire.com
      - key: EMAIL_PROVIDER
        value: siteground
      - key: IMAP_HOST
        value: gukm1010.siteground.biz
      - key: IMAP_PORT
        value: 993
      - key: IMAP_SECURE
        value: "true"
      - key: IMAP_USER
        value: info@autodoorsyorkshire.com
      - key: IMAP_USERNAME
        value: info@autodoorsyorkshire.com
      - key: IMAP_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: gukm1010.siteground.biz
      - key: SMTP_PORT
        value: 465
      - key: SMTP_SECURE
        value: "true"
      - key: SMTP_USER
        value: info@autodoorsyorkshire.com
      - key: SMTP_USERNAME
        value: info@autodoorsyorkshire.com
      - key: SMTP_PASSWORD
        sync: false
      - key: CREATE_IMAP_DRAFTS
        value: "false"
      - key: CREATE_PROVIDER_DRAFTS
        value: "false"
      - key: WEBHOOK_SECURITY_MODE
        value: hmac
      - key: CHECKATRADE_WEBHOOK_SECRET
        sync: false
      - key: WEBHOOK_TRUST_PROXY
        value: "false"
      - key: CHECKATRADE_WEBHOOK_ENVIRONMENT
        value: development
      - key: CHECKATRADE_ALLOWED_IPS_DEVELOPMENT
        value: 34.105.162.121,34.89.85.173,35.234.151.94
      - key: CHECKATRADE_ALLOWED_IPS_PRODUCTION
        value: 35.246.15.126,35.242.187.239,34.39.18.129
      - key: SERVICE_COVERAGE
        value: uk_wide
      - key: LOCAL_PRIORITY_POSTCODES
        value: HD
      - key: REGIONAL_PRIORITY_POSTCODES
        value: HX,WF,BD,LS,OL,M,S,SK,HG,YO,BB,DN
      - key: CHECKATRADE_HEADLESS
        value: "true"
      - key: CHECKATRADE_SESSION_STATE_PATH
        value: ./secure/checkatrade-auth.json
      - key: CHECKATRADE_LOGIN_URL
        sync: false
      - key: CHECKATRADE_DASHBOARD_URL
        sync: false
      - key: CHECKATRADE_ENQUIRIES_URL
        sync: false
      - key: CHECKATRADE_USERNAME
        sync: false
      - key: CHECKATRADE_PASSWORD
        sync: false
